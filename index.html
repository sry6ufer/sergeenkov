<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SERGEENKOV</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0a0a0a;
  color:white;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

h1 {
  font-size:48px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.card {
  cursor:pointer;
  border-radius:20px;
  overflow:hidden;
  background:#111;
}

.card img {
  width:100%;
  height:350px;
  object-fit:cover;
}

.card h3 {
  padding:15px;
}

/* МОДАЛКА */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

.modal.active {
  display:flex;
}

.modal img {
  max-height:70vh;
}

.controls {
  margin-top:15px;
}

button {
  padding:10px 15px;
  margin:5px;
  background:white;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <h1>SERGEENKOV</h1>

  <div class="grid">

    <div class="card" onclick="openAlbum('bmw')">
      <img src="b7.jpg">
      <h3>BMW</h3>
    </div>

    <div class="card" onclick="openAlbum('ferrari')">
      <img src="f7.jpg">
      <h3>Ferrari</h3>
    </div>

    <div class="card" onclick="openAlbum('lixiang')">
      <img src="L7.jpg">
      <h3>Li Xiang</h3>
    </div>

  </div>
</div>

<div class="modal" id="modal">
  <img id="mainImg">
  <div class="controls">
    <button onclick="prev()">←</button>
    <button onclick="next()">→</button>
    <button onclick="closeModal()">Закрыть</button>
  </div>
</div>

<script>

const albums = {

  bmw: [
    "b7.jpg",
    "b.jpg",
    "b2.jpg",
    "b3.jpg",
    "b4.jpg",
    "b5.jpg",
    "b6.jpg"
  ],

  ferrari: [
    "f7.jpg",
    "f.jpg",
    "f2.jpg",
    "f3.jpg",
    "f4.jpg",
    "f5.jpg",
    "f6.jpg"
  ],

  lixiang: [
    "L7.jpg",
    "L.jpg",
    "L2.jpg",
    "L3.jpg",
    "L4.jpg",
    "L5.jpg",
    "L6.jpg"
  ]

};

let currentAlbum = [];
let index = 0;

function openAlbum(name){
  currentAlbum = albums[name];
  index = 0;
  document.getElementById("modal").classList.add("active");
  show();
}

function show(){
  document.getElementById("mainImg").src = currentAlbum[index];
}

function next(){
  index = (index + 1) % currentAlbum.length;
  show();
}

function prev(){
  index = (index - 1 + currentAlbum.length) % currentAlbum.length;
  show();
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

</script>

</body>
</html>
